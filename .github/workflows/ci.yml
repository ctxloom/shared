name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-devcontainer

permissions:
  contents: read

jobs:
  # Release gate: every change to main must carry a fresh, untagged VERSION.
  # Fails the PR/push if VERSION already has a git tag, forcing a deliberate
  # `versionator set` bump (no auto-increment). On merge, auto-release.yml tags
  # this VERSION immutably. VERSION holds the bare version (0.7.0); tag is v0.7.0.
  version-guard:
    name: Version Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if VERSION is already tagged
        run: |
          V="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$V" ]; then echo "::error::VERSION file is empty"; exit 1; fi
          TAG="v${V#v}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error file=VERSION::VERSION $V is already tagged ($TAG). Bump it (versionator set <next>) before merging."
            exit 1
          fi
          echo "VERSION $V ($TAG) is not yet tagged — OK to merge and release."

  build-container:
    name: Build Dev Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build-container]
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Run tests
        run: just -f justfile.container test
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build-container]
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Run golangci-lint
        run: just -f justfile.container lint

  # Advisory (non-gating) for now: mutation runs and reports on every PR but does
  # not block merge (continue-on-error). Ratchet to gating — drop continue-on-error
  # — once the suite is strong enough to hold .gremlins.yaml's efficacy threshold.
  mutation:
    name: Mutation Testing (advisory)
    runs-on: ubuntu-latest
    needs: [build-container, test]
    continue-on-error: true
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      # Diff-only mutation on both PR and push, so a green PR runs the same check
      # that gates the release on main. Whole-codebase runs are too slow per PR.
      - name: Run mutation tests (diff)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No base commit to diff against — skipping mutation testing."; exit 0
          fi
          # gremlins fails an empty changeset (0 mutants => exit 10); skip when the
          # diff has no mutable Go (mirrors .gremlins.yaml exclude-files).
          mutable="$(git diff --name-only "$base"...HEAD -- '*.go' \
            | grep -vE '(_test\.go$|\.pb\.go$|/mock_[^/]*\.go$|(^|/)testdata/)' || true)"
          if [ -z "$mutable" ]; then
            echo "No mutable Go files changed vs $base — skipping mutation testing."; exit 0
          fi
          echo "Mutable Go files in diff:"; printf '  %s\n' $mutable
          gremlins unleash --diff "$base"
